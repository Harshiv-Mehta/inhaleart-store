<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" role="img" aria-labelledby="title desc">
  <title id="title">Inhale Art keepsake collection</title>
  <desc id="desc">Pastel keepsake plaque artwork with floral frame styling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9fc"/>
      <stop offset="100%" stop-color="#f0fff9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1400" fill="url(#bg)"/>
  <rect x="185" y="165" width="830" height="1070" rx="60" fill="#fffefd" fill-opacity=".9" stroke="#ecdfe9"/>
  <rect x="295" y="290" width="610" height="760" rx="38" fill="#f7d7e2" fill-opacity=".48" stroke="#ffffff" stroke-width="18"/>
  <rect x="360" y="355" width="480" height="500" rx="30" fill="#fff" fill-opacity=".7"/>
  <circle cx="320" cy="330" r="48" fill="#ffdce7"/>
  <circle cx="880" cy="330" r="48" fill="#d9f4ea"/>
  <circle cx="320" cy="1000" r="48" fill="#ece4ff"/>
