  <text x="600" y="925" text-anchor="middle" fill="#8b81b0" font-family="Arial, sans-serif" font-size="40" letter-spacing="9">MEMORY PLAQUE</text>
  <text x="600" y="985" text-anchor="middle" fill="#a89ec6" font-family="Arial, sans-serif" font-size="28" letter-spacing="6">PERSONAL AND GIFT READY</text>
