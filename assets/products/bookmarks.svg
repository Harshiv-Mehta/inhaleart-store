<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" role="img" aria-labelledby="title desc">
  <title id="title">Inhale Art bookmark collection</title>
  <desc id="desc">Pastel bookmark artwork with tassels and resin shimmer styling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7fb"/>
      <stop offset="55%" stop-color="#eafaf5"/>
      <stop offset="100%" stop-color="#f2ebff"/>
    </linearGradient>
    <linearGradient id="bookmarkA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdce8"/>
      <stop offset="100%" stop-color="#c9f0e6"/>
    </linearGradient>
    <linearGradient id="bookmarkB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff5ff"/>
      <stop offset="100%" stop-color="#eadfff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1400" fill="url(#bg)"/>
  <circle cx="180" cy="180" r="120" fill="#ffffff" fill-opacity=".55"/>
  <circle cx="1040" cy="250" r="160" fill="#ffdfe6" fill-opacity=".55"/>
  <circle cx="980" cy="1180" r="190" fill="#d9f4ea" fill-opacity=".6"/>
  <rect x="190" y="190" width="820" height="1020" rx="48" fill="#fffefd" fill-opacity=".82" stroke="#f0dce6"/>
  <rect x="280" y="300" width="180" height="700" rx="90" fill="url(#bookmarkA)" stroke="#ffffff" stroke-width="18"/>
  <rect x="510" y="250" width="180" height="760" rx="90" fill="url(#bookmarkB)" stroke="#ffffff" stroke-width="18"/>
  <rect x="740" y="320" width="180" height="680" rx="90" fill="url(#bookmarkA)" stroke="#ffffff" stroke-width="18"/>
  <circle cx="370" cy="1040" r="18" fill="#ceb7ef"/>
  <circle cx="600" cy="1050" r="18" fill="#8bd4c4"/>
  <circle cx="830" cy="1040" r="18" fill="#f4b8cb"/>
  <path d="M370 1058 C330 1130, 325 1190, 365 1260" stroke="#e3c2ce" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M600 1068 C560 1135, 560 1195, 600 1270" stroke="#b7dccf" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M830 1058 C790 1130, 785 1190, 825 1260" stroke="#e3c2ce" stroke-width="12" stroke-linecap="round" fill="none"/>
  <text x="600" y="130" text-anchor="middle" fill="#736f99" font-family="Georgia, serif" font-size="74">Bookmarks</text>
  <text x="600" y="1190" text-anchor="middle" fill="#9b90b7" font-family="Arial, sans-serif" font-size="42" letter-spacing="10">SOFT GLOW EDIT</text>
